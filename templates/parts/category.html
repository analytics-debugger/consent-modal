<div class="cm-category {{activeClass}}" data-dta-cm-cat="{{key}}">
  <div class="cm-category-info">
    {{emojiHtml}}
    <div>
      <p class="cm-category-label">{{label}}{{sublabelHtml}}</p>
      <p class="cm-category-desc">{{description}}</p>
    </div>
  </div>
  <button type="button" class="cm-toggle {{toggleClass}}" data-dta-cm-toggle="{{key}}" {{disabledAttr}}>
    <span class="cm-toggle-knob"></span>
  </button>
</div>
